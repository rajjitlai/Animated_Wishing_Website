<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Pen Writing Animation</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css">
</head>

<body>
    <main class="container">
        <article class="paper">
            <header>
                <h1>
                    <span class="title">
                        Happy Father's Day
                    </span>
                </h1>
            </header>
            <section id="flipbook" aria-label="Photo gallery">
                <img src="images/1.png" alt="A cherished memory with Dad" class="flip-image active">
                <img src="images/2.png" alt="Happy moments together" class="flip-image">
                <img src="images/3.png" alt="Family celebration" class="flip-image">
                <img src="images/4.png" alt="Dad smiling" class="flip-image">
                <img src="images/5.png" alt="Special occasion" class="flip-image">
            </section>
            <section class="message" aria-live="polite">
                <span class="txt-type"></span>
            </section>
        </article>
    </main>
    <script src="js/index.js"></script>
</body>

</html>
