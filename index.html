<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Pen Writing Animation</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="paper">
            <h1>
                <span class="title">
                    Happy Father's Day
                </span>
            </h1>
            <div class="section-top">
                <div class="flipwrap">
                    <div id="flipbook">
                        <img src="images/1.png" alt="photo" class="flip-image active">
                        <img src="images/2.png" alt="photo" class="flip-image">
                        <img src="images/3.png" alt="photo" class="flip-image">
                        <img src="images/4.png" alt="photo" class="flip-image">
                        <img src="images/5.png" alt="photo" class="flip-image">
                    </div>
                </div>
            </div>
            <div class="section-bottom">
                <div class="message">
                    <span class="txt-type">
                        <span class="text-content"></span>
                        <svg class="pencil-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor">
                            <path d="M362.7 19.3L314.3 67.7 444.3 197.7l48.4-48.4c25-25 25-65.5 0-90.5L453.3 19.3c-25-25-65.5-25-90.5 0zm-71 71L58.6 323.5c-10.4 10.4-18 23.3-22.2 37.4L1 481.2C-1.5 489.7 .8 498.8 7 505s15.3 8.5 23.7 6.1l120.3-35.4c14.1-4.2 27-11.8 37.4-22.2L421.7 220.3 291.7 90.3z"/>
                        </svg>
                    </span>
                </div>
            </div>
        </div>
    </div>
    <script src="js/index.js"></script>
</body>

</html>
