<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Pen Writing Animation</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css">
</head>

<body>
    <div class="container">
        <div class="paper">
            <h1>
                <span class="title">
                    Happy Father's Day
                </span>
                <br>
                <div class="message">
                    <div id="flipbook">
                        <img src="images/1.png" alt="photo" class="flip-image active">
                        <img src="images/2.png" alt="photo" class="flip-image">
                        <img src="images/3.png" alt="photo" class="flip-image">
                        <img src="images/4.png" alt="photo" class="flip-image">
                        <img src="images/5.png" alt="photo" class="flip-image">
                    </div>
                    <span class="txt-type"></span>
                    <i class="fas fa-pencil-alt"></i>
                </div>
            </h1>
        </div>
    </div>
    <script src="/js/index.js"></script>
</body>

</html>
